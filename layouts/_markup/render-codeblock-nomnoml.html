{{- .Page.Scratch.Add "nomnoml_auto_x" 1 -}}
{{- $x := .Page.Scratch.Get "nomnoml_auto_x" -}}

{{- $caption := .Attributes.caption -}}
{{- if not (eq (.Attributes.markdownifyCaption) "off" ) -}}
    {{- $caption = $caption | markdownify -}}
{{- end -}}

<figure id="nomnoml-figure-{{$x}}" class="{{ with .Attributes.class }}{{ . }}{{ else }}umlZoom{{ end }}"{{ if .Attributes.zoomable}} style="cursor: zoom-in;" onclick="toggleNomnoml({{$x}})"{{ end }}>
    {{- if .Attributes.link }}
        <a href="{{ .Attributes.link }}"{{ with .Attributes.target }} target="{{ . }}"{{ end }}{{ with .Attributes.rel }} rel="{{ . }}"{{ end }}>
    {{- end }}
    <canvas id="nomnoml-{{$x}}">{{ .Inner }}</canvas>
    {{- if .Attributes.link }}
        </a>
    {{- end }}
    {{- if or (or .Attributes.title .Attributes.caption) .Attributes.attr -}}
        <figcaption>
            {{ with .Attributes.title -}}
                <h4>{{ . }}</h4>
            {{- end -}}
            {{- if or .Attributes.caption .Attributes.attr -}}<p>
                {{- $caption -}}
                {{- with .Attributes.attrlink -}}
                    <a href="{{ . }}">
                {{- end -}}
                {{- .Attributes.attr | markdownify -}}
                {{- if .Attributes.attrlink }}</a>{{ end }}</p>
            {{- end }}
        </figcaption>
    {{- end }}
</figure>

<script>
window.addEventListener("load", function() {
    nomnoml.draw(document.getElementById("nomnoml-{{$x}}"), "{{ .Inner }}");
});
</script>

{{- .Page.Store.Set "hasNomnoml" true -}}
